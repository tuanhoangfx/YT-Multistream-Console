name: Reusable Release

on:
  workflow_call:
    inputs:
      run_smoke:
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify quality gates
        run: |
          pnpm lint
          pnpm test:unit
          pnpm build

      - name: Smoke test
        if: ${{ inputs.run_smoke }}
        run: pnpm test:smoke:ci

      - name: Publish Windows installer to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: corepack pnpm exec electron-builder --win nsis-web --publish always
